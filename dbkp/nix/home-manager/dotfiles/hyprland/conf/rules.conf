# Window rules

# Default to floating windows
windowrule = float on, match:class .*

# Firefox on workspace 1, maximized
windowrule = workspace 1, match:class ^(app\.zen_browser\.zen|org\.mozilla\.firefox)$

# Thunderbird on workspace 4, fullscreen
windowrule = workspace 4, match:class ^(org\.mozilla\.Thunderbird)$

# Chat apps on workspace 3, right 2/3 width, full height
windowrule = workspace 3,   match:class ^(org\.signal\.Signal|org\.telegram\.desktop|telegram\.desktop|com\.discordapp\.Discord|org\.gnome\.Fractal)$
windowrule = size 66% 100%, match:class ^(org\.signal\.Signal|org\.telegram\.desktop|telegram\.desktop|com\.discordapp\.Discord|org\.gnome\.Fractal)$
windowrule = move 33% 0,    match:class ^(org\.signal\.Signal|org\.telegram\.desktop|telegram\.desktop|com\.discordapp\.Discord|org\.gnome\.Fractal)$
